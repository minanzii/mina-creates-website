<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale = 1.0">
    <title>Mina Creates</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://use.typekit.net/dom2ngp.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Limelight&family=Mea+Culpa&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Limelight&family=Mea+Culpa&family=Style+Script&display=swap"
        rel="stylesheet">
</head>

<body class="home-page">
    <div class="header">
        <div class="container">
            <div class="navbar">
                <div class="logo">
                    <a href="index.html">
                        <img src="images/logo.png" width="100px">
                    </a>

                </div>

                <div>
                    <h1 class="nav-title">Mina Creates</h1>
                </div>

                <nav>
                    <ul id="MenuItems">
                        <li><a href="about.html" class="nav-btn">About</a></li>
                        <li><a href="products.html" class="nav-btn">Products</a></li>
                        <li><a href="contact.html" class="nav-btn">Contact</a></li>
                    </ul>
                </nav>
                <img src="images/cart.png" width="30px" height="30px">
                <img src="images/menu.png" class="menu-icon" onclick="menutoggle()">
            </div>
        </div>
    </div>

    <!--- main --->
    
    <div class="contact-container">
        <form action="https://api.web3forms.com/submit" method="POST" class="contact-left">
            <div class="contact-left-title">
                <a href="index.html">
                    <img src="images/home.png" width="30px" height="30px">
                </a>
                <h2>Contact</h2>
                <hr>
            </div>
            <input type="hidden" name="access_key" value="e074d224-7176-41c8-b272-143444b10df5">
            <input type="text" name="name" placeholder="Your Name" class="contact-inputs" required>
            <input type="text" name="email" placeholder="Email" class="contact-inputs" required>
            <textarea name="message" placeholder="Message" class="contact-inputs" required></textarea>
            <button type="submit" class="btn-submit">Submit</button>
        </form>
        <div class="contact-right">
            <img src="images/logo.png">
        </div>
    </div>
    


    <!--- footer --->
    <div class="footer">
        <div class="footer-container">
            <h3>Follow our instagram!</h3>
            <h4>@minacreates</h4>
        </div>
    </div>


    <!----- js for toggle menu ---->

    <script>
        var MenuItems = document.getElementById("MenuItems");
        MenuItems.style.maxHeight = "0px";
        function menutoggle() {
            if (MenuItems.style.maxHeight == "0px") {
                MenuItems.style.maxHeight = "200px";
            }
            else {
                MenuItems.style.maxHeight = "0px";
            }
        }
    </script>

</body>

</html>
